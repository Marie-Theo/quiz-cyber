<section class="login/register containers">
    <link rel="stylesheet" href="/loginAndRegister/form.connexion.css">
    <div class="options_connexion">
        <button class="selected" onclick="changeSelect('Connexion')">Se connecter</button>
        <button class="unselected" onclick="changeSelect('Inscription')">Créer un compte</button>
    </div>
    <form action="LoginUser.php" method="post" class="form-connexion">
        <fieldset class="item">
            <legend>Connexion</legend>
            <hr style="width: 45%; margin: auto;">
            <div class="item">
                <label for="login-username">Pseudonyme:</label>
                <input type="text" id="login-username" name="login-username" required>
            </div>
            <div class="item">
                <label for="login-password">Mot de passe:</label>
                <input type="password" id="login-password" name="login-password" placeholder="••••••••" required>
            </div>
            <button class="item default-button" type="submit">Login</button>
        </fieldset>
    </form>
    <form action="RegisterUser.php" method="post" class="form-inscription">
        <fieldset class="item">
            <legend>Création de compte</legend>
            <hr style="width: 45%; margin: auto;">
            <div class="item">
                <label for="register-username">Pseudonyme:</label>
                <input type="text" id="register-username" name="register-username" required>
            </div>
            <div class="item">
                <label for="register-password">Mot de passe:</label>
                <input type="password" id="register-password" name="register-password" placeholder="••••••••" required>
            </div>
            <div class="item">
                <label for="register-confirm-password">Verification de mot de passe:</label>
                <input type="password" id="register-confirm-password" name="register-confirm-password" placeholder="••••••••" required>
            </div>
            <button class="item default-button" type="submit">Créer un compte</button>
        </fieldset>
    </form>
</section>

<script>
    var button_selected = document.querySelector(".options_connexion .selected");
    var button_unselected = document.querySelector(".options_connexion .unselected");
    var form_connexion = document.querySelector(".form-connexion");
    var form_inscription = document.querySelector(".form-inscription");

    function changeSelect(buttonToSelect) {
        if (buttonToSelect == "Connexion") {
            button_selected.classList.remove("unselected");
            button_selected.classList.add("selected");
            button_unselected.classList.remove("selected");
            button_unselected.classList.add("unselected");

            form_connexion.style.display  = "block";
            form_inscription.style.display  = "none";
        } else if (buttonToSelect == "Inscription") {
            button_selected.classList.remove("selected");
            button_selected.classList.add("unselected");
            button_unselected.classList.remove("unselected");
            button_unselected.classList.add("selected");

            form_connexion.style.display  = "none";
            form_inscription.style.display  = "block";
        }
    }
    changeSelect('Connexion');
</script>
